# A generic, single database configuration.

[alembic]
# path to migration scripts
script_location = migrations

# template used to generate migration file names; The default value is %%(rev)s_%%(slug)s
# Uncomment the line below if you want the files to be prepended with date and time
# file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# sys.path path, will be prepended to sys.path in migration env.py
prepend_sys_path = .

# version location is migrations/versions; this is the default
# version_locations = %(script_location)s/versions

# timezone to use when rendering the date within the migration file
# timezone =

# max length of characters to apply to the "slug" field
# truncate_slug_length = 40

# set to 'true' to run the environment during
# the 'revision' command
# revision_environment = false

# set to 'true' to allow .pyc and .pyo files to be detected as revisions in
# the versions/ directory
# sourceless = false

# version path separator; As mentioned above, this is the character used to split
# version_locations. The default within new alembic.ini files is "os", which uses
# os.pathsep. If this key is not present, or values other than "os", "posix",
# "nt" are used, the value of version_path_separator is used to split the
# string, so the following are equivalent:
# version_path_separator = os
# version_path_separator = :
# version_path_separator = ;

# the output encoding used when revision files
# are written from script.py.mako
# output_encoding = utf-8

# Database URL is intentionally NOT set here. The actual URL is resolved at
# runtime in migrations/env.py from the MORPHIX_DB environment variable so that
# `alembic` and the running app share the exact same SQLite path.
# sqlalchemy.url =


[post_write_hooks]
# post_write_hooks defines scripts or Python functions that are run
# on newly generated revision scripts.  See the documentation for further
# detail and examples


# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
