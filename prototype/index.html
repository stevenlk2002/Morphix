    function createCanvasNode(type, x, y) {
      const def = getNodeDef(type);
      if (!def) return;
      const id = 'node-' + (orchestrateState.nextId++);
      orchestrateState.nodes.push({ id, type, x, y, config: {}, inputs: {} });
      renderCanvasNodes();
      toast('已添加节点：' + def.title);
    }

    function startCanvasNodeDrag(e, id) {
      e.preventDefault();
      e.stopPropagation();
      const node = orchestrateState.nodes.find(n => n.id === id);
      if (!node) return;
      orchestrateState.selectedNodeId = id;
      orchestrateState.selectedLinkId = null;
      renderCanvasNodes();
      const startX = e.clientX;
      const startY = e.clientY;
      const origX = node.x;
      const origY = node.y;
      const el = document.getElementById(id);
      function onMove(ev) {
        node.x = origX + (ev.clientX - startX);
        node.y = origY + (ev.clientY - startY);
        if (el) {
          el.style.left = node.x + 'px';
          el.style.top = node.y + 'px';
        }
        renderLinks();
      }
      function onUp(ev) {
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
        const moved = Math.abs(ev.clientX - startX) + Math.abs(ev.clientY - startY) > 3;
        if (!moved) selectNode(id);
      }
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    }

    function startPanelNodeDrag(e, type) {
      e.preventDefault();
      const def = getNodeDef(type);
      if (!def) return;
      const ghost = document.createElement('div');
      ghost.className = 'flow-panel-node flow-drag-ghost';
      ghost.style.width = '220px';
      ghost.innerHTML = '<div class="flow-panel-node-icon" style="background:' + def.color + ';">' + getNodeIconHtml(def) + '</div><div class="flow-panel-node-info"><div class="flow-panel-node-title">' + def.title + '</div></div>';
      document.body.appendChild(ghost);
      function moveGhost(ev) {
        ghost.style.left = (ev.clientX - 15) + 'px';
        ghost.style.top = (ev.clientY - 15) + 'px';
      }
      moveGhost(e);
      function onUp(ev) {
        const canvas = document.getElementById('flowCanvas');
        const rect = canvas.getBoundingClientRect();
        if (ev.clientX >= rect.left && ev.clientX <= rect.right && ev.clientY >= rect.top && ev.clientY <= rect.bottom) {
          createCanvasNode(type, ev.clientX - rect.left - 30, ev.clientY - rect.top - 20);
        }
        ghost.remove();
        document.removeEventListener('mousemove', moveGhost);
        document.removeEventListener('mouseup', onUp);
      }
      document.addEventListener('mousemove', moveGhost);
      document.addEventListener('mouseup', onUp);
    }

    function setupCanvasEvents() {
      const canvas = document.getElementById('flowCanvas');
      if (!canvas) return;
      canvas.addEventListener('mousedown', (e) => {
        if (e.target === canvas) {
          closeNodeInspector();
          if (orchestrateState.selectedLinkId) {
            orchestrateState.selectedLinkId = null;
            renderLinks();
          }
        }
      });
    }
    function niEsc(s) {
      return String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }
    function niEscHtml(s) {
      return String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function selectNode(id) {
      const node = orchestrateState.nodes.find(n => n.id === id);
      if (!node) return;
      orchestrateState.selectedNodeId = id;
      orchestrateState.selectedLinkId = null;
      const panel = document.getElementById('flowPanel');
      if (panel) panel.style.display = 'none';
      renderCanvasNodes();
      renderNodeInspector();
      const ins = document.getElementById('nodeInspector');
      if (ins) ins.classList.add('open');
    }

    function closeNodeInspector() {
      const ins = document.getElementById('nodeInspector');
      if (ins) ins.classList.remove('open');
      const panel = document.getElementById('flowPanel');
      if (panel && !orchestrateState.collapsed) panel.style.display = '';
      orchestrateState.selectedNodeId = null;
      renderCanvasNodes();
    }

    function getNodeConfig(node) {
      if (!node.config) node.config = {};
      return node.config;
    }
    function getNodeInputs(node) {
      if (!node.inputs) node.inputs = {};
      return node.inputs;
    }

    function dtBadge(dt) {
      const pt = getPortType(dt);
      return '<span class="dt-badge" style="background:' + pt.color + '15;color:' + pt.color + ';border-color:' + pt.color + '30">' + escAttr(pt.label) + '</span>';
    }

    function renderNodeInspector() {
      const ins = document.getElementById('nodeInspector');
      if (!ins) return;
      const node = orchestrateState.nodes.find(n => n.id === orchestrateState.selectedNodeId);
      if (!node) { ins.classList.remove('open'); return; }
      const def = getNodeDef(node.type);
      const schema = NODE_SCHEMAS[node.type] || { inputs: [], outputs: [], config: [] };
      const cfg = getNodeConfig(node);
      const insVals = getNodeInputs(node);
      const icon = def ? getNodeIconHtml(def) : icons.doc;
      const color = def ? def.color : '#6a9bcc';
      let html = '';
      html += '<div class="node-inspector-header">'
        + '<div class="node-inspector-header-icon" style="background:' + color + ';">' + icon + '</div>'
        + '<div class="node-inspector-header-title">' + (def ? def.title : node.type) + '<small>节点类型：' + node.type + '</small></div>'
        + '<button class="node-inspector-del" title="删除节点" onclick="deleteNode(\'' + node.id + '\')">' + icons.trash + '</button>'
        + '<button class="node-inspector-close" title="关闭" onclick="closeNodeInspector()">×</button>'
        + '</div>';
      html += '<div class="node-inspector-body">';
      // 输入参数
      if (schema.inputs && schema.inputs.length) {
        html += '<div class="inspector-section"><div class="inspector-section-title">输入参数</div>';
        schema.inputs.forEach(inp => {
          const req = inp.required ? '<span class="inspector-req">*</span>' : '';
          const modeText = inp.mode === 'connect' ? '仅连线' : (inp.mode === 'input' ? '仅输入' : '连线/输入');
          html += '<div class="inspector-field"><div class="inspector-field-label">' + niEsc(inp.name) + req
            + dtBadge(inp.dataType) + '<span class="inspector-mode">' + modeText + '</span></div>';
          if (inp.mode === 'connect') {
            html += '<div class="inspector-port-chip"><span class="dot"></span>连线输入 · <code>' + niEsc(inp.varName) + '</code></div>';
          } else {
            const val = insVals[inp.key] != null ? insVals[inp.key] : '';
            const ph = '直接输入，或用 {' + inp.varName + '} 引用' + (inp.mode === 'both' ? '（也可连线）' : '');
            html += '<input data-node-input="' + niEsc(inp.key) + '" value="' + niEsc(val) + '" placeholder="' + niEsc(ph) + '" oninput="updateNodeInput(\'' + node.id + '\',\'' + inp.key + '\',this.value)">';
          }
          html += '</div>';
        });
        html += '</div>';
      } else {
        html += '<div class="inspector-section empty-hint">该节点无输入参数（流程入口 / 触发型节点）。</div>';
      }
      // 执行配置
      if (schema.config && schema.config.length) {
        html += '<div class="inspector-section"><div class="inspector-section-title">执行配置</div>';
        schema.config.forEach(c => {
          if (c.fieldType === 'note') {
            html += '<div class="inspector-hint">' + niEscHtml(c.placeholder || '') + '</div>';
            return;
          }
          const req = c.required ? '<span class="inspector-req">*</span>' : '';
          const val = cfg[c.key] != null ? cfg[c.key] : (c.default != null ? c.default : '');
          html += '<div class="inspector-field"><div class="inspector-field-label">' + niEsc(c.label) + req + '</div>';
          if (c.fieldType === 'select') {
            html += '<select data-node-config="' + niEsc(c.key) + '" onchange="updateNodeConfig(\'' + node.id + '\',\'' + c.key + '\',this.value)">';
            (c.options || []).forEach(o => {
              html += '<option value="' + niEsc(o) + '"' + (String(val) === String(o) ? ' selected' : '') + '>' + niEscHtml(o) + '</option>';
            });
            html += '</select>';
          } else if (c.fieldType === 'textarea') {
            html += '<textarea data-node-config="' + niEsc(c.key) + '" placeholder="' + niEsc(c.placeholder || '') + '" oninput="updateNodeConfig(\'' + node.id + '\',\'' + c.key + '\',this.value)">' + niEscHtml(val) + '</textarea>';
          } else {
            const type = c.fieldType === 'number' ? 'number' : 'text';
            html += '<input type="' + type + '" data-node-config="' + niEsc(c.key) + '" value="' + niEsc(val) + '" placeholder="' + niEsc(c.placeholder || '') + '" oninput="updateNodeConfig(\'' + node.id + '\',\'' + c.key + '\',this.value)">';
          }
          html += '</div>';
        });
        html += '</div>';
      }
      // 输出参数
      if (schema.outputs && schema.outputs.length) {
        html += '<div class="inspector-section"><div class="inspector-section-title">输出参数</div>';
        schema.outputs.forEach(o => {
          html += '<div class="inspector-output-row"><span class="out-name">' + niEsc(o.name) + '</span>' + dtBadge(o.dataType) + '<code>' + niEsc(o.varName) + '</code></div>';
        });
        html += '</div>';
      }
      html += '<div class="inspector-footer-note">输入点通过 <code>{变量名}</code> 在文本中引用；带 <code>*</code> 的必填输入点必须赋值才能保存。相同数据类型的输入 / 输出点方可连线。</div>';
      html += '</div>';
      ins.innerHTML = html;
    }

    function updateNodeConfig(id, key, value) {
      const node = orchestrateState.nodes.find(n => n.id === id);

      getNodeConfig(node)[key] = value;

      const node = orchestrateState.nodes.find(n => n.id === id);

    function createNewTraining() {
      const list = document.querySelector('.train-history-list');
      if (!list) return;
      const items = list.querySelectorAll('.train-history-item');
      const maxNum = [].slice.call(items).reduce((max, item) => {
        const title = item.querySelector('.history-title');
        const match = title ? title.textContent.match(/训练历史(\d+)/) : null;
        return match ? Math.max(max, parseInt(match[1], 10)) : max;
      }, 0);
      const nextNum = maxNum + 1;
      const historyId = 'hist-' + Date.now();
      const now = new Date();
      const pad = n => String(n).padStart(2, '0');
      const timeStr = `${now.getFullYear()}-${pad(now.getMonth() + 1)}-${pad(now.getDate())} ${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
      const item = document.createElement('div');
      item.className = 'train-history-item';
      item.dataset.historyId = historyId;
      item.innerHTML = `
        <div class="history-title">训练历史${nextNum}</div>
        <div class="history-time">${timeStr}</div>
        <div class="history-meta"><span>好评 0</span><span>差评 0</span><span>总回复 0</span></div>
        <button class="history-delete" title="删除训练历史" onclick="event.stopPropagation(); deleteTrainHistory(this)">${icons.trash}</button>
      `;
      trainingConversations[historyId] = [];
      list.insertBefore(item, list.firstElementChild);
      list.querySelectorAll('.train-history-item').forEach(i => i.classList.remove('active'));
      item.classList.add('active');
      renderTrainingChat(historyId);
      toast('新建训练成功');
    }

          // 部分无头/测试环境无剪贴板权限，仍演示成功反馈

      } else {
        const textarea = document.createElement('textarea');
        textarea.value = text;
        textarea.style.position = 'fixed';
        textarea.style.opacity = '0';
        document.body.appendChild(textarea);
        textarea.select();
        try { document.execCommand('copy'); toast(successMsg); } catch (e) { toast('复制失败'); }
        document.body.removeChild(textarea);
      }

    function startResizeHistory(e) {
      const layout = document.querySelector('.train-chat-layout');
      const resizer = e.currentTarget;
      if (!layout || layout.classList.contains('full')) return;
      resizer.classList.add('dragging');
      const startX = e.clientX;
      const startWidth = layout.getBoundingClientRect().width;
      const startHistory = parseFloat(getComputedStyle(layout).gridTemplateColumns.split(' ')[0]) || 240;
      const minWidth = 180;
      const maxWidth = Math.max(minWidth, startWidth * 0.55);
      function onMove(ev) {
        const dx = ev.clientX - startX;
        let newWidth = Math.round(startHistory + dx);
        newWidth = Math.max(minWidth, Math.min(maxWidth, newWidth));
        layout.style.setProperty('--history-width', newWidth + 'px');
      }
      function onUp() {
        resizer.classList.remove('dragging');
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
      }
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    }

      const cfg = mode === 'message' ? messageData : sessionData;
      const data = cfg.data;
      const colors = cfg.colors;
      const labels = cfg.labels;
      const max = cfg.max;
      const yTicks = cfg.yTicks;

      const w = el.clientWidth, h = el.clientHeight;
      const padding = { top: 12, right: 8, bottom: 28, left: 34 };
      const chartW = w - padding.left - padding.right;
      const chartH = h - padding.top - padding.bottom;
      const getX = i => padding.left + i * chartW / (data.length - 1);
      const getY = v => padding.top + chartH - (v / max) * chartH;

      let html = `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" style="overflow:visible;">
        <defs>
          <clipPath id="homeChartClip">
            <rect x="${padding.left}" y="${padding.top}" width="${chartW}" height="${chartH}" />
          </clipPath>
        </defs>`;

      // Horizontal grid + Y-axis labels
      for (let i = 0; i <= yTicks; i++) {
        const y = padding.top + chartH - (i / yTicks) * chartH;
        html += `<line class="chart-grid" x1="${padding.left}" y1="${y}" x2="${w - padding.right}" y2="${y}" />`;
        html += `<text class="chart-axis-text" x="${padding.left - 10}" y="${y + 4}" text-anchor="end">${i}</text>`;
      }
      // Vertical grid lines
      data.forEach((d, i) => {
        const x = getX(i);
        html += `<line class="chart-grid" x1="${x}" y1="${padding.top}" x2="${x}" y2="${padding.top + chartH}" />`;
      });
      // Axes
      html += `<line class="chart-axis" x1="${padding.left}" y1="${padding.top + chartH}" x2="${w - padding.right}" y2="${padding.top + chartH}" />`;
      html += `<line class="chart-axis" x1="${padding.left}" y1="${padding.top}" x2="${padding.left}" y2="${padding.top + chartH}" />`;

      // Smooth curve helper (Monotone Cubic Interpolation -> cubic bezier)
      const smoothPath = pts => {
        if (pts.length < 2) return '';
        const n = pts.length;
        const h = pts[1].x - pts[0].x;
        const d = [];
        for (let i = 0; i < n - 1; i++) d[i] = (pts[i+1].y - pts[i].y) / h;
        const m = new Array(n);
        m[0] = d[0];
        m[n-1] = d[n-2];
        for (let i = 1; i < n - 1; i++) {
          if (d[i-1] * d[i] <= 0) m[i] = 0;
          else m[i] = 2 / (1/d[i-1] + 1/d[i]);
        }
        for (let i = 0; i < n - 1; i++) {
          if (d[i] === 0) { m[i] = 0; m[i+1] = 0; continue; }
          const alpha = m[i] / d[i];
          const beta = m[i+1] / d[i];
          if (alpha < 0) m[i] = 0;
          if (beta < 0) m[i+1] = 0;
          if (alpha * alpha + beta * beta > 9) {
            const tau = 3 / Math.sqrt(alpha * alpha + beta * beta);
            m[i] = tau * alpha * d[i];
            m[i+1] = tau * beta * d[i];
          }
        }
        let path = `M${pts[0].x.toFixed(2)},${pts[0].y.toFixed(2)}`;
        for (let i = 0; i < n - 1; i++) {
          const p0 = pts[i], p1 = pts[i+1];
          const cp1x = p0.x + h / 3;
          const cp1y = p0.y + m[i] * h / 3;
          const cp2x = p1.x - h / 3;
          const cp2y = p1.y - m[i+1] * h / 3;
          path += ` C${cp1x.toFixed(2)},${cp1y.toFixed(2)} ${cp2x.toFixed(2)},${cp2y.toFixed(2)} ${p1.x.toFixed(2)},${p1.y.toFixed(2)}`;
        }
        return path;
      };
      // Areas and lines (clipped to chart area)
      ['新增','处理'].forEach(key => {
        const points = data.map((d, i) => ({x: getX(i), y: getY(d[key])}));
        const pathD = smoothPath(points);
        const areaD = pathD + ` L${points[points.length-1].x.toFixed(2)},${(padding.top + chartH).toFixed(2)} L${points[0].x.toFixed(2)},${(padding.top + chartH).toFixed(2)} Z`;
        html += `<path d="${areaD}" fill="${colors[key]}" class="chart-area" clip-path="url(#homeChartClip)"/>`;
        html += `<path d="${pathD}" stroke="${colors[key]}" class="chart-line" clip-path="url(#homeChartClip)"/>`;
        points.forEach(p => {
          html += `<circle cx="${p.x}" cy="${p.y}" r="4" fill="${colors[key]}" stroke="#fff" stroke-width="2" data-key="${key}" clip-path="url(#homeChartClip)"/>`;
        });
      });

      // X-axis labels
      data.forEach((d, i) => {
        const x = getX(i);
        html += `<text class="chart-axis-text" x="${x}" y="${padding.top + chartH + 18}" text-anchor="middle">${d.label.slice(5)}</text>`;
      });

      // Crosshair line (hidden initially)
      html += `<line class="chart-crosshair" id="homeCrosshair" x1="0" y1="${padding.top}" x2="0" y2="${padding.top + chartH}" style="display:none;" />`;
      // Invisible event overlay
      html += `<rect x="${padding.left}" y="${padding.top}" width="${chartW}" height="${chartH}" fill="none" id="homeChartOverlay" style="cursor:crosshair;" pointer-events="all" />`;
      html += `</svg>`;
      // Tooltip
      html += `<div class="chart-tooltip" id="homeTooltip"></div>`;
      el.innerHTML = html;

      const overlay = el.querySelector('#homeChartOverlay');
      const crosshair = el.querySelector('#homeCrosshair');
      const tooltip = el.querySelector('#homeTooltip');
      const svg = el.querySelector('svg');

      function showTip(e) {
        const rect = svg.getBoundingClientRect();
        const mx = e.clientX - rect.left;
        const x0 = padding.left;
        const step = chartW / (data.length - 1);
        let idx = Math.round((mx - x0) / step);
        idx = Math.max(0, Math.min(data.length - 1, idx));
        const d = data[idx];
        const x = getX(idx);
        crosshair.setAttribute('x1', x);
        crosshair.setAttribute('x2', x);
        crosshair.style.display = 'block';
        tooltip.style.display = 'block';
        tooltip.innerHTML = `<div class="chart-tooltip-date">${d.label}</div>
          <div class="chart-tooltip-row"><span class="chart-tooltip-dot" style="background:${colors['新增']};"></span><span style="flex:1;">${labels['新增']}:</span><span style="font-weight:600;">${d['新增']}</span></div>
          <div class="chart-tooltip-row"><span class="chart-tooltip-dot" style="background:${colors['处理']};"></span><span style="flex:1;">${labels['处理']}:</span><span style="font-weight:600;">${d['处理']}</span></div>`;
        // Position tooltip near point, keep inside container
        let tx = x + 12;
        let ty = getY(Math.max(d['新增'], d['处理'])) - 10;
        if (tx + 180 > w) tx = x - 180;
        if (ty + tooltip.offsetHeight > h) ty = h - tooltip.offsetHeight - 10;
        if (ty < 0) ty = 10;
        tooltip.style.left = tx + 'px';
        tooltip.style.top = ty + 'px';
      }
      function hideTip() {
        crosshair.style.display = 'none';
        tooltip.style.display = 'none';
      }
      overlay.addEventListener('mousemove', showTip);
      overlay.addEventListener('mouseleave', hideTip);
      overlay.addEventListener('touchstart', e => { e.preventDefault(); showTip(e.touches[0]); }, {passive:false});
      overlay.addEventListener('touchmove', e => { e.preventDefault(); showTip(e.touches[0]); }, {passive:false});
      overlay.addEventListener('touchend', hideTip);
    }

      }

          html += `<rect x="${x}" y="${h-40-bh}" width="${Math.max(barW-1,1)}" height="${bh}" fill="${s.color}" rx="1"><title>${d.label} ${s.key}: ${val}</title></rect>`;

        {key:'transferRate', label:'机器人转人工率', color:'#ef4444', isRate:true}
      ];
      function showDataTip(e) {
        const rect = svg.getBoundingClientRect();

    function applyContactFilters() {
      const type = contactState.currentType;
      const status = contactState.currentStatus;
      const name = contactState.nameFilter;
      const account = contactState.currentAccount;
      document.querySelectorAll('.contacts-item').forEach(item => {
        let show = item.dataset.type === type;
        if (show && status !== 'all') show = item.dataset.status === status;
        if (show && name) show = (item.dataset.name || '').toLowerCase().includes(name);
        if (show && account !== 'all') show = item.dataset.account === account;
        item.classList.toggle('hide', !show);
      });

    function escapeHtml(str) {
      return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }
    function highlightJson(html) {
      return html
        .replace(/"([^"]+)":/g, '<span class="key">"$1":</span>')
        .replace(/: "([^"]+)"/g, ': <span class="string">"$1"</span>')
        .replace(/: (\d+)/g, ': <span class="number">$1</span>')
        .replace(/: (true|false)/g, ': <span class="boolean">$1</span>')
        .replace(/: (null)/g, ': <span class="null">$1</span>');
    }
    function copyDebugCode(btn) {
      const block = btn.closest('.debug-code-block').querySelector('.debug-code-body');
      const text = block.textContent;
      navigator.clipboard.writeText(text).then(() => {
        const original = btn.innerHTML;
        btn.innerHTML = `${icons.check} 已复制`;
        setTimeout(() => btn.innerHTML = original, 1500);
      }).catch(() => {
        toast('复制失败');
      });
    }

    // ============== BANNER CAROUSEL ==============
    let bannerIndex = 0;
    function initBannerCarousel() {
      const carousel = document.querySelector('.banner-carousel');
      if (!carousel) return;
      const slides = carousel.querySelector('.banner-slides');
      const dots = carousel.querySelectorAll('.banner-dot');
      if (!slides) return;
      const update = () => {
        slides.style.transform = `translateX(-${bannerIndex * 100}%)`;
        dots.forEach((d, i) => d.classList.toggle('active', i === bannerIndex));
      };
      carousel.querySelector('.banner-prev')?.addEventListener('click', () => {
        bannerIndex = (bannerIndex - 1 + dots.length) % dots.length;
        update();
      });
      carousel.querySelector('.banner-next')?.addEventListener('click', () => {
        bannerIndex = (bannerIndex + 1) % dots.length;
        update();
      });
      dots.forEach((d, i) => d.addEventListener('click', () => { bannerIndex = i; update(); }));
      setInterval(() => { bannerIndex = (bannerIndex + 1) % dots.length; update(); }, 6000);
    }

    function changeHostingMonth(delta) {
      hostingCalendarDate.setMonth(hostingCalendarDate.getMonth() + delta);

    function renderHostingCalendar() {
      const year = hostingCalendarDate.getFullYear();
      const month = hostingCalendarDate.getMonth();
      document.getElementById('hostingCalendarTitle').textContent = `${year}年 ${month + 1}月`;
      const firstDay = new Date(year, month, 1).getDay();
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      const today = new Date();
      const isToday = (d) => today.getFullYear() === year && today.getMonth() === month && today.getDate() === d;
      const labels = ['日','一','二','三','四','五','六'];
      let html = labels.map(l => `<div class="day-label">${l}</div>`).join('');
      for (let i = 0; i < firstDay; i++) html += `<div class="day"></div>`;
      for (let d = 1; d <= daysInMonth; d++) {
        const cls = isToday(d) ? 'day today' : 'day';
        html += `<div class="${cls}" onclick="selectHostingDate(${d})">${d}</div>`;
      }
      document.getElementById('hostingCalendarGrid').innerHTML = html;
    }

    function selectHostingDate(day) {
      const year = hostingCalendarDate.getFullYear();
      const month = hostingCalendarDate.getMonth() + 1;
      document.getElementById('hostingDateText').textContent = `${year}-${String(month).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
      document.getElementById('hostingCalendarPopover').classList.remove('open');
      hostingCalendarVisible = false;
    }

    function saveTagGroup(isEdit) {
      const nameInput = document.getElementById('tagGroupName');
      const tagInputs = document.querySelectorAll('#tagInputsContainer .tag-input');
      const name = nameInput.value.trim();
      if (!name) { toast('请输入标签组名称'); return; }
      const tags = Array.from(tagInputs).map(i => i.value.trim()).filter(Boolean);
      if (!tags.length) { toast('请至少添加一个标签'); return; }
      if (isEdit) {
        const originalName = document.getElementById('editOriginalName').value;
        const idx = tagGroups.findIndex(g => g.name === originalName);
        if (idx >= 0) tagGroups[idx] = { name, tags };
      } else {
        tagGroups.push({ name, tags });

      toast(isEdit ? '标签组修改成功' : '标签组创建成功');
      closeModal();
      renderTagsPage();

      'mobile-session-hosting': `<div class="mobile-miniapp-page">

    function renderContent() {
      const content = document.getElementById('content');
      const html = Object.keys(pages).map(key => {
        let pageHtml = pages[key];
        if (key === 'robot-train') {
          pageHtml = pageHtml.split('${currentRobot.name}').join(currentRobot.name);
        }
        return `<div class="page ${key === currentPage ? 'active' : ''}" data-page="${key}">${pageHtml}</div>`;
      }).join('');
      content.innerHTML = html;
    }

    // ============== MESSAGES PAGE ==============
    const messageState = {
      messages: [],
      currentTab: 'unread',
      currentPage: 1,
      pageSize: 20,
      titleFilter: ''
    };

    function initMessages() {
      messageState.messages = [
        { id: 1, title: '可用额度不足预警', content: '账户的可用额度仅剩余0.00元，为避免影响您的正常使用，请及时进入资源管理进行充值。', time: '2026-07-10 10:20:02', read: false, warning: true },

        { id: 4, title: '[竹绿-健康]已上线', content: '[竹绿-健康]已于2026-07-09 22:41:39上线，您可以接收到该账号的消息了。', time: '2026-07-09 22:41:40', read: false },
        { id: 5, title: '[竹绿-健康]已掉线', content: '[竹绿-健康]已于2026-07-09 22:38:54掉线，原因为[客户端登出]。为不影响您的消息接收，请尽快重新登录。', time: '2026-07-09 22:38:54', read: false },
        { id: 6, title: '[竹绿-健康]已完成同步', content: '[竹绿-健康]已于2026-07-09 18:13:41完成同步，您现在可以开始使用该账号了，如果您没有看到对话，请刷新页面。', time: '2026-07-09 18:13:41', read: false },
        { id: 7, title: '[竹绿-健康]已开始同步', content: '[竹绿-健康]已于2026-07-09 18:09:31开始同步，预计将在20分钟内同步完成，请勿在其他pc设备登录账号。', time: '2026-07-09 18:09:39', read: false }
      ];
    }

    function getFilteredMessages() {
      let list = messageState.messages.filter(m => (messageState.currentTab === 'read' ? m.read : !m.read));
      if (messageState.titleFilter) {
        list = list.filter(m => m.title.includes(messageState.titleFilter));
      }
      return list;
    }

    function renderMessagesPage() {
      const filterSelect = document.getElementById('msgTitleFilter');
      if (filterSelect) {
        const titles = [...new Set(messageState.messages.map(m => m.title))];
        filterSelect.innerHTML = `<option value="">全部</option>` + titles.map(t => `<option value="${t}" ${messageState.titleFilter === t ? 'selected' : ''}>${t}</option>`).join('');
      }

      const container = document.getElementById('messagesTableContainer');
      const paginationEl = document.getElementById('messagesPagination');
      if (!container) return;

      const list = getFilteredMessages();
      const total = list.length;
      const start = (messageState.currentPage - 1) * messageState.pageSize;
      const end = start + messageState.pageSize;
      const pageList = list.slice(start, end);

      if (pageList.length === 0) {
        container.innerHTML = `<div class="messages-empty">暂无${messageState.currentTab === 'read' ? '已读' : '未读'}消息</div>`;
      } else {
        container.innerHTML = `<table class="messages-table">
          <thead><tr>
            <th class="col-title">标题</th>
            <th class="col-content">内容</th>
            <th class="col-time">时间</th>
            <th class="col-action">操作</th>
          </tr></thead>
          <tbody>
            ${pageList.map(m => `<tr>
              <td><div class="msg-title ${m.warning ? 'warning' : ''}">${m.title}</div></td>
              <td><div class="msg-content">${m.content}</div></td>
              <td><div class="msg-time">${m.time}</div></td>
              <td><div class="msg-actions">
                ${messageState.currentTab === 'unread' ? `<button class="btn-text read" onclick="markMessageRead(${m.id})">已读</button>` : ''}
                <button class="btn-text" onclick="viewMessageDetail(${m.id})">查看详情</button>
              </div></td>
            </tr>`).join('')}
          </tbody>
        </table>`;
      }

      document.querySelectorAll('.messages-tab').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.tab === messageState.currentTab);
      });

      const totalPages = Math.ceil(total / messageState.pageSize) || 1;
      let pageBtns = '';
      for (let i = 1; i <= totalPages; i++) {
        pageBtns += `<button class="page-btn ${i === messageState.currentPage ? 'active' : ''}" onclick="goMessagePage(${i})">${i}</button>`;
      }
      if (paginationEl) {
        paginationEl.innerHTML = `<span>第 ${Math.min(start + 1, total)}-${Math.min(end, total)} 条/总共 ${total} 条</span>
          <div style="display:flex;gap:4px;">${pageBtns}</div>
          <select onchange="changeMessagePageSize(this.value)">
            <option value="10" ${messageState.pageSize == 10 ? 'selected' : ''}>10条/页</option>
            <option value="20" ${messageState.pageSize == 20 ? 'selected' : ''}>20条/页</option>
            <option value="50" ${messageState.pageSize == 50 ? 'selected' : ''}>50条/页</option>
          </select>`;
      }
    }

    function switchMessageTab(tab) {
      messageState.currentTab = tab;
      messageState.currentPage = 1;
      renderMessagesPage();
    }

    function markMessageRead(id) {
      const msg = messageState.messages.find(m => m.id === id);
      if (msg) {
        msg.read = true;
        toast('已归档到已读');
        renderMessagesPage();
      }
    }

    function markMessageReadFromModal(id) {
      markMessageRead(id);
      closeModal();
    }

    function markAllMessagesRead() {
      if (messageState.currentTab === 'read') return;
      const unreadCount = messageState.messages.filter(m => !m.read).length;
      if (unreadCount === 0) {
        toast('没有未读消息');
        return;
      }
      messageState.messages.forEach(m => m.read = true);
      toast(`已将 ${unreadCount} 条消息归档到已读`);
      renderMessagesPage();
    }

    function viewMessageDetail(id) {
      const msg = messageState.messages.find(m => m.id === id);
      if (!msg) return;
      const overlay = document.getElementById('modalOverlay');
      overlay.innerHTML = `<div class="modal" onclick="event.stopPropagation()">
        <div class="modal-header"><span class="card-title">${msg.title}</span><button class="btn-icon" onclick="closeModal()">${icons.close}</button></div>
        <div class="modal-body"><p style="font-size:13px;line-height:1.7;color:var(--text-secondary);margin:0;">${msg.content}</p></div>
        <div class="modal-footer">
          <button class="btn btn-secondary" onclick="closeModal()">取消</button>
          ${!msg.read ? `<button class="btn btn-primary" onclick="markMessageReadFromModal(${msg.id})">已读</button>` : `<button class="btn btn-primary" onclick="closeModal()">确认</button>`}
        </div>
      </div>`;
      overlay.classList.add('open');
    }

    function applyMessageFilter() {
      const select = document.getElementById('msgTitleFilter');
      messageState.titleFilter = select ? select.value : '';
      messageState.currentPage = 1;
      renderMessagesPage();
    }

    function resetMessageFilter() {
      messageState.titleFilter = '';
      messageState.currentPage = 1;
      const select = document.getElementById('msgTitleFilter');
      if (select) select.value = '';
      renderMessagesPage();
    }

    function goMessagePage(page) {
      messageState.currentPage = page;
      renderMessagesPage();
    }

    function changeMessagePageSize(size) {
      messageState.pageSize = parseInt(size, 10);
      messageState.currentPage = 1;
      renderMessagesPage();
    }

    // Init
    initMessages();
    renderNav();
    navigate('home');
  </script>
</body>
</html>
